services:
  - type: web
    name: socratic-spark-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # set manually in Render dashboard
      - key: TEACHER_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false          # set to your Vercel URL after deploying frontend
      - key: CHROMA_DB_PATH
        value: /var/data/chroma_db
      - key: SQLITE_DB_PATH
        value: /var/data/sessions.db
    disk:
      name: socratic-data
      mountPath: /var/data
      sizeGB: 1
